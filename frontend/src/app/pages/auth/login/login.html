<main class="flex min-h-screen items-center justify-center p-6">
  <section class="w-full max-w-sm">
    <h1 class="text-2xl font-semibold">Welcome back</h1>
    <p class="mt-2">Sign in and continue your playtest loop.</p>

    <form class="mt-6 space-y-4" (ngSubmit)="submit()">
      <div>
        <label class="mb-1 block">Email</label>
        <input
          class="w-full border px-3 py-2"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
        />
      </div>

      <div>
        <label class="mb-1 block">Password</label>
        <input
          class="w-full border px-3 py-2"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
        />
      </div>

      @if (errorMessage()) {
        <div class="text-sm">
          {{ errorMessage() }}
        </div>
      }

      <button
        class="w-full border px-4 py-2 disabled:opacity-50"
        type="submit"
        [disabled]="loading()"
      >
        {{ loading() ? 'Signing in...' : 'Login' }}
      </button>
    </form>

    <a class="mt-4 block text-center underline" routerLink="/auth/register">
      Create account
    </a>
  </section>
</main>
