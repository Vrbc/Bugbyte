<main class="flex min-h-screen items-center justify-center p-6">
  <section class="w-full max-w-xl">
    <h1 class="text-2xl font-semibold">Create account</h1>
    <p class="mt-2">Join Bugbyte as a developer or tester.</p>

    <div class="mt-6 grid gap-3 sm:grid-cols-2">
      <button
        type="button"
        class="border p-3 text-left"
        [class.border-2]="role === 'DEVELOPER'"
        (click)="selectRole('DEVELOPER')"
      >
        <strong class="block">Developer</strong>
        <span class="mt-1 block text-sm">Create games, builds and playtest campaigns.</span>
      </button>

      <button
        type="button"
        class="border p-3 text-left"
        [class.border-2]="role === 'TESTER'"
        (click)="selectRole('TESTER')"
      >
        <strong class="block">Tester</strong>
        <span class="mt-1 block text-sm">Apply for campaigns and submit feedback bytes.</span>
      </button>
    </div>

    <form class="mt-6 space-y-4" (ngSubmit)="submit()">
      <div>
        <label class="mb-1 block">Username</label>
        <input
          class="w-full border px-3 py-2"
          name="username"
          [(ngModel)]="username"
          required
        />
      </div>

      <div>
        <label class="mb-1 block">Email</label>
        <input
          class="w-full border px-3 py-2"
          type="email"
          name="email"
          [(ngModel)]="email"
          required
        />
      </div>

      <div>
        <label class="mb-1 block">Password</label>
        <input
          class="w-full border px-3 py-2"
          type="password"
          name="password"
          [(ngModel)]="password"
          required
        />
      </div>

      @if (role === 'DEVELOPER') {
        <div>
          <label class="mb-1 block">Studio name</label>
          <input
            class="w-full border px-3 py-2"
            name="studioName"
            [(ngModel)]="studioName"
            required
          />
        </div>

        <div>
          <label class="mb-1 block">Bio</label>
          <textarea
            class="w-full border px-3 py-2"
            name="bio"
            rows="3"
            [(ngModel)]="bio"
          ></textarea>
        </div>

        <div>
          <label class="mb-1 block">Website URL</label>
          <input
            class="w-full border px-3 py-2"
            name="websiteUrl"
            [(ngModel)]="websiteUrl"
          />
        </div>
      }

      @if (role === 'TESTER') {
        <div>
          <label class="mb-1 block">Testing platforms</label>

          <div class="mt-2 flex flex-wrap gap-2">
            @for (platform of availablePlatforms; track platform) {
              <button
                type="button"
                class="border px-3 py-1 text-sm"
                [class.border-2]="selectedPlatforms.includes(platform)"
                (click)="togglePlatform(platform)"
              >
                {{ platform }}
              </button>
            }
          </div>
        </div>

        <div>
          <label class="mb-1 block">Favorite genres</label>

          <div class="mt-2 flex flex-wrap gap-2">
            @for (genre of availableGenres; track genre) {
              <button
                type="button"
                class="border px-3 py-1 text-sm"
                [class.border-2]="selectedGenres.includes(genre)"
                (click)="toggleGenre(genre)"
              >
                {{ genre }}
              </button>
            }
          </div>
        </div>

        <div>
          <label class="mb-1 block">Experience level</label>
          <select
            class="w-full border px-3 py-2"
            name="experienceLevel"
            [(ngModel)]="experienceLevel"
          >
            <option value="BEGINNER">Beginner</option>
            <option value="CASUAL">Casual</option>
            <option value="EXPERIENCED">Experienced</option>
            <option value="QA_ORIENTED">QA-oriented</option>
          </select>
        </div>
      }

      @if (errorMessage()) {
        <div class="text-sm">
          {{ errorMessage() }}
        </div>
      }

      <button
        class="w-full border px-4 py-2 disabled:opacity-50"
        type="submit"
        [disabled]="loading()"
      >
        {{ loading() ? 'Creating account...' : 'Create account' }}
      </button>
    </form>

    <a class="mt-4 block text-center underline" routerLink="/auth/login">
      Already have an account?
    </a>
  </section>
</main>
